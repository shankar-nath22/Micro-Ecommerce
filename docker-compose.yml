version: "3.9"

services:
  # ------------------------------
  # INFRASTRUCTURE
  # ------------------------------

  auth-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-data:/var/lib/postgresql/data
    networks:
      - ecom-net

  order-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: order_db
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - order-data:/var/lib/postgresql/data
    networks:
      - ecom-net

  payment-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - payment-data:/var/lib/postgresql/data
    networks:
      - ecom-net

  mongo:
    image: mongo:latest
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - ecom-net

  inventory-mongo:
    image: mongo:latest
    restart: always
    volumes:
      - inventory-mongo-data:/data/db
    networks:
      - ecom-net

  review-db:
    image: mongo:latest
    restart: always
    volumes:
      - review-mongo-data:/data/db
    networks:
      - ecom-net

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - ecom-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - ecom-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecom-net

  # ------------------------------
  # SERVICES
  # ------------------------------

  auth-service:
    build: ./auth-service
    restart: always
    mem_limit: 300m
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx256m"
    depends_on:
      - auth-db
      - redis
    networks:
      - ecom-net

  product-service:
    build: ./product-service
    restart: always
    mem_limit: 300m
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/products_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx256m"
    depends_on:
      - mongo
      - redis
    networks:
      - ecom-net

  cart-service:
    build: ./cart-service
    restart: always
    environment:
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - ecom-net

  order-service:
    build: ./order-service
    restart: always
    environment:
      DB_DSN: "host=order-db user=postgres password=${DB_PASSWORD} dbname=order_db port=5432 sslmode=disable"
      CART_URL: http://cart-service:8083
      PRODUCT_URL: http://product-service:8082
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - order-db
      - kafka
    networks:
      - ecom-net

  payment-service:
    build: ./payment-service
    restart: always
    environment:
      DB_DSN: "host=payment-db user=postgres password=${DB_PASSWORD} dbname=payment_db port=5432 sslmode=disable"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - payment-db
      - kafka
    networks:
      - ecom-net

  inventory-service:
    build: ./inventory-service
    restart: always
    mem_limit: 300m
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://inventory-mongo:27017/inventory_db
      KAFKA_BROKERS: kafka:9092
      JAVA_OPTS: "-Xms128m -Xmx256m"
    depends_on:
      - inventory-mongo
      - kafka
    networks:
      - ecom-net

  notification-service:
    build: ./notification-service
    restart: always
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - ecom-net

  wishlist-service:
    build: ./wishlist-service
    restart: always
    environment:
      MONGODB_URI: mongodb://mongo:27017/wishlist_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      - ecom-net

  review-service:
    build: ./review-service
    restart: always
    environment:
      MONGODB_URI: mongodb://review-db:27017/reviews_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - review-db
    networks:
      - ecom-net

  api-gateway:
    build: ./api-gateway
    restart: always
    mem_limit: 300m
    ports:
      - "8080:8080"
    environment:
      AUTH_URL: http://auth-service:8081
      PRODUCT_URL: http://product-service:8082
      CART_URL: http://cart-service:8083
      ORDER_URL: http://order-service:8084
      PAYMENT_URL: http://payment-service:8085
      INVENTORY_URL: http://inventory-service:8086
      NOTIFICATION_URL: http://notification-service:8087
      WISHLIST_URL: http://wishlist-service:8088
      REVIEW_URL: http://review-service:8089
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JAVA_OPTS: "-Xms128m -Xmx256m"
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service
      - wishlist-service
      - review-service
    networks:
      - ecom-net

networks:
  ecom-net:
    driver: bridge

volumes:
  auth-data:
  order-data:
  payment-data:
  mongo-data:
  inventory-mongo-data:
  review-mongo-data:
  redis-data:
  zookeeper-data:
  zookeeper-log: