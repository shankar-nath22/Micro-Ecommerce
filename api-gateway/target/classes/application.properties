# ------------------------------
# API Gateway Basic Config
# ------------------------------
server.port=8080
spring.application.name=api-gateway

# ------------------------------
# JWT Secret (not used in dev mode)
# ------------------------------
jwt.secret=JWT_SECRET:FmX2a9Pce4zQ1Lp98NsTy7WqR5vUb6KdGh1Jm2LoWp9Zx3YqHr8St4VuCe7xDf9

# ------------------------------
# Gateway Routes
# ------------------------------
spring.cloud.gateway.routes[0].id=auth
spring.cloud.gateway.routes[0].uri=${AUTH_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=product
spring.cloud.gateway.routes[1].uri=${PRODUCT_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[2].id=cart
spring.cloud.gateway.routes[2].uri=${CART_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/cart/**

spring.cloud.gateway.routes[3].id=order
spring.cloud.gateway.routes[3].uri=${ORDER_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/orders/**

spring.cloud.gateway.httpclient.wiretap=true

# spring.cloud.gateway.forwarded-headers-strategy=framework


# Disable ALL Spring Security auto configs
# spring.autoconfigure.exclude=\
# org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
# org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,\
# org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

# ------------------------------
# Force WebFlux for Gateway
# ------------------------------
spring.main.web-application-type=reactive
